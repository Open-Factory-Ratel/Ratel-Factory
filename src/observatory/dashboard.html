<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratel Observatory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #000000;
      color: #ffffff;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #top-bar {
      flex-shrink: 0;
    }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #timeline {
      width: 35%;
      overflow-y: auto;
      padding: 12px 16px;
      border-right: 1px solid #333333;
    }
    #details {
      width: 65%;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    #details-placeholder {
      color: #8e8e93;
      font-style: italic;
      text-align: center;
      padding: 40px 20px;
    }
    #details-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid #333333;
      margin-bottom: 12px;
    }
    #details-header h3 {
      font-size: 14px;
      color: #ffffff;
    }
    #details-body {
      flex: 1;
      overflow: auto;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      color: #ffffff;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Tabs ── */
    #tab-bar {
      display: flex;
      border-bottom: 1px solid #333333;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #8e8e93;
      font-size: 13px;
      user-select: none;
    }
    .tab.active {
      color: #ffffff;
      border-bottom-color: #0a84ff;
    }
    .tab:hover {
      color: #ffffff;
    }

    /* ── Stats ── */
    #stats-bar {
      display: flex;
      gap: 24px;
      padding: 10px 16px;
      background: #111111;
      border-bottom: 1px solid #333333;
      flex-shrink: 0;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; text-transform: uppercase; color: #8e8e93; letter-spacing: 0.5px; }
    .stat-value { font-size: 16px; font-weight: 600; color: #ffffff; }
    .stat-value.failed { color: #ff453a; }

    /* ── Filters ── */
    #filters {
      display: flex;
      gap: 12px;
      padding: 8px 16px;
      background: #111111;
      border-bottom: 1px solid #333333;
      flex-shrink: 0;
      align-items: center;
    }
    #filters input[type="text"] {
      flex: 1;
      background: #000000;
      border: 1px solid #333333;
      color: #ffffff;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }
    #filters select {
      background: #000000;
      border: 1px solid #333333;
      color: #ffffff;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #filters label { color: #8e8e93; font-size: 11px; }
    #filters .filter-toggle {
      background: #1c1c1e;
      border: 1px solid #333333;
      color: #ffffff;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      user-select: none;
    }
    #filters .filter-toggle.active {
      background: #8e8e93;
      border-color: #8e8e93;
      color: #000000;
    }

    /* ── Timeline events ── */
    .event {
      display: flex;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 4px;
      background: #111111;
      border: 1px solid #222222;
      border-left: 3px solid #333333;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }
    .event:hover { background: #1c1c1e; }
    .event.selected { background: #2c2c2e; border-color: #8e8e93; }
    .event .ts { color: #8e8e93; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .event .type { font-weight: 600; flex-shrink: 0; min-width: 110px; }
    .event .level { color: #8e8e93; flex-shrink: 0; min-width: 100px; }
    .event .summary { color: #ffffff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event .status { font-size: 10px; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }

    /* ── Color rules ── */
    .event.failed, .event.parseStatus-failed { border-left-color: #ff453a !important; background: #2a1010; }
    .event.event-halt { background: #2a1010; border-left-color: #ff453a !important; }
    .event.event-phase_transition { border-left-color: #0a84ff; }
    .event.event-agent_start { border-left-color: #bf5af2; }
    .event.event-agent_end { border-left-color: #bf5af2; }
    .event.level-worker { background: rgba(48, 209, 88, 0.05); }
    .event.level-scrutiny_validator { background: rgba(255, 159, 10, 0.07); }
    .event.level-user_testing_validator { background: rgba(191, 90, 242, 0.07); }
    .event.event-tool_call { background: #1c1c1e; }
    .event.event-tool_result { background: #1c1c1e; }
    .event.event-session_tool_start { background: rgba(10, 132, 255, 0.06); }
    .event.event-session_tool_end { background: rgba(10, 132, 255, 0.06); }
    .event.event-validation_recovery { background: rgba(255, 159, 10, 0.10); border-left-color: #ff9f0a; }
    .event.event-integration_preflight { background: rgba(255, 159, 10, 0.10); border-left-color: #ff9f0a; }
    .event.event-tool_result.parseStatus-ok { border-left-color: #30d158; }
    .event.event-ping { background: #1c1c1e; border-left-color: #ffd60a; }
    .event.event-ping.failed { border-left-color: #ff453a !important; background: #2a1010; }

    .status-ok { background: #0f2e1b; color: #30d158; }
    .status-failed { background: #3d1a1a; color: #ff453a; }
    .status-info { background: #0a1f33; color: #0a84ff; }

    /* ── Agent span cards ── */
    .span-card {
      background: #111111;
      border: 1px solid #333333;
      border-left: 3px solid #bf5af2;
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .span-header {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
    }
    .span-header:hover { background: #1c1c1e; }
    .span-toggle { color: #8e8e93; font-size: 11px; width: 12px; flex-shrink: 0; }
    .span-title { font-weight: 600; color: #bf5af2; }
    .span-meta { color: #8e8e93; font-size: 11px; margin-left: auto; }
    .span-body {
      padding: 4px 12px 12px 32px;
      border-top: 1px solid #222222;
    }
    .span-body.collapsed { display: none; }

    .nested-event {
      display: flex;
      gap: 8px;
      padding: 4px 8px;
      margin: 2px 0;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      border-left: 2px solid #333333;
    }
    .nested-event:hover { background: #1c1c1e; }
    .nested-event.failed { border-left-color: #ff453a; background: #2a1010; }
    .nested-event .ts { color: #8e8e93; font-variant-numeric: tabular-nums; }
    .nested-event .summary { color: #ffffff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .empty {
      text-align: center;
      color: #8e8e93;
      padding: 40px 20px;
      font-style: italic;
    }

    /* ── Diff viewer ── */
    .diff-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .diff-hunk {
      border: 1px solid #333333;
      border-radius: 4px;
      overflow: hidden;
    }
    .diff-hunk-header {
      background: #1c1c1e;
      padding: 6px 12px;
      font-size: 11px;
      color: #8e8e93;
      border-bottom: 1px solid #333333;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .diff-line {
      display: flex;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .diff-line-num {
      width: 48px;
      text-align: right;
      padding-right: 8px;
      color: #8e8e93;
      flex-shrink: 0;
      user-select: none;
    }
    .diff-line-ind {
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      user-select: none;
      color: #8e8e93;
    }
    .diff-line-text {
      flex: 1;
      white-space: pre;
      overflow-x: auto;
    }
    .diff-line-ctx {
      background: transparent;
      color: #ffffff;
    }
    .diff-line-add {
      background: rgba(63, 185, 80, 0.15);
      color: #7ee787;
    }
    .diff-line-add .diff-line-ind {
      color: #3fb950;
    }
    .diff-line-del {
      background: rgba(248, 81, 73, 0.15);
      color: #ff7b72;
    }
    .diff-line-del .diff-line-ind {
      color: #f85149;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div id="stats-bar">
        <div class="stat">
          <div class="stat-label">Total Events</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Active Agents</div>
          <div class="stat-value" id="stat-active">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Latest Phase</div>
          <div class="stat-value" id="stat-phase">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Parse Failures</div>
          <div class="stat-value failed" id="stat-failures">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Halts</div>
          <div class="stat-value failed" id="stat-halts">0</div>
        </div>
      </div>

      <div id="filters">
        <input type="text" id="search" placeholder="Search events..." />
        <label>Type:
          <select id="filter-type">
            <option value="">all</option>
            <option value="agent_start">agent_start</option>
            <option value="agent_end">agent_end</option>
            <option value="tool_call">tool_call</option>
            <option value="tool_result">tool_result</option>
            <option value="phase_transition">phase_transition</option>
            <option value="artifact_write">artifact_write</option>
            <option value="state_loaded">state_loaded</option>
            <option value="decision_logged">decision_logged</option>
            <option value="halt">halt</option>
            <option value="mission_initialized">mission_initialized</option>
            <option value="ping">ping</option>
            <option value="session_tool_start">session_tool_start</option>
            <option value="session_tool_end">session_tool_end</option>
            <option value="session_agent_event">session_agent_event</option>
            <option value="validation_recovery">validation_recovery</option>
            <option value="integration_preflight">integration_preflight</option>
          </select>
        </label>
        <label>Level:
          <select id="filter-level">
            <option value="">all</option>
            <option value="orchestrator">orchestrator</option>
            <option value="worker">worker</option>
            <option value="scrutiny_validator">scrutiny_validator</option>
            <option value="user_testing_validator">user_testing_validator</option>
            <option value="research">research</option>
            <option value="smart_friend">smart_friend</option>
            <option value="contract_writer">contract_writer</option>
            <option value="code_review">code_review</option>
          </select>
        </label>
        <label>Status:
          <select id="filter-status">
            <option value="">all</option>
            <option value="ok">ok</option>
            <option value="failed">failed</option>
          </select>
        </label>
        <span class="filter-toggle" id="toggle-failed-only">Failed only</span>
        <span class="filter-toggle" id="toggle-spans">Group spans</span>
      </div>
    </div>

    <div id="main">
      <div id="timeline"></div>
      <div id="details">
        <div id="tab-bar">
          <div class="tab active" id="tab-diff" data-tab="diff">Live Workspace Diff</div>
          <div class="tab" id="tab-json" data-tab="json">Event Raw JSON</div>
        </div>
        <div id="details-content">
          <div id="details-placeholder">Select an event to view details</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    // ── State ──
    const state = {
      events: [],
      lastEventCount: 0,
      diff: { diff: '', status: '' },
      filter: { type: '', level: '', status: '', search: '', failedOnly: false, groupSpans: true },
      selectedEventId: null,
      activeTab: 'diff',
    };

    // ── DOM refs ──
    const $timeline = document.getElementById('timeline');
    const $search = document.getElementById('search');
    const $filterType = document.getElementById('filter-type');
    const $filterLevel = document.getElementById('filter-level');
    const $filterStatus = document.getElementById('filter-status');
    const $toggleFailedOnly = document.getElementById('toggle-failed-only');
    const $toggleSpans = document.getElementById('toggle-spans');
    const $statTotal = document.getElementById('stat-total');
    const $statActive = document.getElementById('stat-active');
    const $statPhase = document.getElementById('stat-phase');
    const $statFailures = document.getElementById('stat-failures');
    const $statHalts = document.getElementById('stat-halts');
    const $details = document.getElementById('details');
    const $detailsContent = document.getElementById('details-content');
    const $tabDiff = document.getElementById('tab-diff');
    const $tabJson = document.getElementById('tab-json');

    // ── Helpers ──
    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return d.toTimeString().slice(0, 8);
      } catch { return '--:--:--'; }
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function summarizeEvent(e) {
      const d = e.data || {};
      if (e.event_type === 'agent_start') return `${d.agentType || ''} ${d.featureId ? '['+d.featureId+']' : ''} ${d.milestoneId ? '['+d.milestoneId+']' : ''}`.trim();
      if (e.event_type === 'agent_end') return `${d.featureId || d.milestoneId || ''} duration=${d.durationMs||0}ms parseStatus=${d.parseStatus||''}`.trim();
      if (e.event_type === 'tool_call') return `${d.toolName || ''}(${JSON.stringify(d.params || {}).slice(0, 80)})`;
      if (e.event_type === 'tool_result') return `${d.toolName || ''} → ${d.parseStatus || ''} ${d.durationMs ? d.durationMs+'ms' : ''}`;
      if (e.event_type === 'session_tool_start') return `${d.toolName || ''} started${d.toolCallId ? ' ['+d.toolCallId+']' : ''}`;
      if (e.event_type === 'session_tool_end') return `${d.toolName || ''} ended ${d.isError ? 'ERROR' : 'OK'} ${d.durationMs ? d.durationMs+'ms' : ''}`;
      if (e.event_type === 'session_agent_event') return `${d.sessionEventType || ''}`;
      if (e.event_type === 'validation_recovery') return `${d.milestoneId || ''}: ${d.fixFeatureCount || 0} fix feature(s) for ${(d.blockingIssueIds || []).join(', ')}`;
      if (e.event_type === 'integration_preflight') return `${d.milestoneId || ''}: ${d.status || ''} on ${d.branch || 'integration'}${(d.missingFeatureIds || []).length ? ' missing '+d.missingFeatureIds.join(', ') : ''}`;
      if (e.event_type === 'phase_transition') return `${d.from} → ${d.to} ${d.reason ? '('+d.reason+')' : ''}`;
      if (e.event_type === 'artifact_write') return `${d.artifactName} (${d.mode}, ${d.byteCount}b)`;
      if (e.event_type === 'decision_logged') return `[${d.decisionId}] ${d.decision || ''}`;
      if (e.event_type === 'halt') return `${d.reason || ''} — ${d.resumeHint || ''}`;
      if (e.event_type === 'mission_initialized') return `goal=${d.goal || '(none)'}`;
      if (e.event_type === 'ping') return `${d.agentName || ''}: ${d.status || ''} (${d.durationMs||0}ms)${d.error ? ' — '+d.error : ''}`;
      return JSON.stringify(d).slice(0, 100);
    }
    function eventMatchesSearch(e, query) {
      if (!query) return true;
      const haystack = JSON.stringify(e).toLowerCase();
      return haystack.includes(query.toLowerCase());
    }
    function eventPassesFilters(e) {
      const f = state.filter;
      if (f.type && e.event_type !== f.type) return false;
      if (f.level && e.agent_level !== f.level) return false;
      if (f.status) {
        const ps = e.data && e.data.parseStatus;
        if (ps !== f.status) return false;
      }
      if (f.failedOnly) {
        const isFailed = e.data && e.data.parseStatus === 'failed';
        const isHalt = e.event_type === 'halt';
        if (!isFailed && !isHalt) return false;
      }
      if (!eventMatchesSearch(e, f.search)) return false;
      return true;
    }

    // ── Diff parser ──
    function parseUnifiedDiff(diffText) {
      const lines = diffText.split('\n');
      const files = [];
      let currentFile = null;
      let currentHunk = null;

      for (const line of lines) {
        if (line.startsWith('diff --git')) {
          currentFile = { hunks: [] };
          files.push(currentFile);
          currentHunk = null;
        } else if (line.startsWith('@@')) {
          const match = line.match(/@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/);
          if (match) {
            currentHunk = {
              oldStart: parseInt(match[1], 10),
              oldCount: parseInt(match[2] || '1', 10),
              newStart: parseInt(match[3], 10),
              newCount: parseInt(match[4] || '1', 10),
              lines: []
            };
            if (currentFile) currentFile.hunks.push(currentHunk);
          }
        } else if (currentHunk && (line.startsWith(' ') || line.startsWith('+') || line.startsWith('-'))) {
          const type = line[0] === '+' ? 'add' : line[0] === '-' ? 'del' : 'ctx';
          currentHunk.lines.push({ type, text: line.slice(1) });
        }
      }
      return files;
    }

    function renderDiff(diffText) {
      if (!diffText || !diffText.trim()) {
        return '<div class="empty">No uncommitted changes in the workspace.</div>';
      }
      const files = parseUnifiedDiff(diffText);
      if (files.length === 0 || files.every(f => f.hunks.length === 0)) {
        return '<div class="empty">No uncommitted changes in the workspace.</div>';
      }
      let html = '<div class="diff-container">';
      for (const file of files) {
        for (const hunk of file.hunks) {
          html += '<div class="diff-hunk">';
          html += `<div class="diff-hunk-header">@@ -${hunk.oldStart},${hunk.oldCount} +${hunk.newStart},${hunk.newCount} @@</div>`;
          let oldNum = hunk.oldStart;
          let newNum = hunk.newStart;
          for (const line of hunk.lines) {
            let oldNumStr = '';
            let newNumStr = '';
            let typeClass = '';
            let indicator = '';
            if (line.type === 'ctx') {
              oldNumStr = oldNum;
              newNumStr = newNum;
              oldNum++;
              newNum++;
              typeClass = 'diff-line-ctx';
              indicator = ' ';
            } else if (line.type === 'del') {
              oldNumStr = oldNum;
              oldNum++;
              typeClass = 'diff-line-del';
              indicator = '-';
            } else if (line.type === 'add') {
              newNumStr = newNum;
              newNum++;
              typeClass = 'diff-line-add';
              indicator = '+';
            }
            html += `<div class="diff-line ${typeClass}">
              <span class="diff-line-num diff-old-num">${oldNumStr}</span>
              <span class="diff-line-num diff-new-num">${newNumStr}</span>
              <span class="diff-line-ind">${indicator}</span>
              <span class="diff-line-text">${escapeHtml(line.text)}</span>
            </div>`;
          }
          html += '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    // ── Stats ──
    function updateStats() {
      const events = state.events;
      $statTotal.textContent = events.length;
      const active = new Set();
      for (const e of events) {
        if (e.event_type === 'agent_start' && e.agent_level) active.add(e.span_id);
        if (e.event_type === 'agent_end' && e.span_id) active.delete(e.span_id);
      }
      $statActive.textContent = active.size;
      const phase = [...events].reverse().find(e => e.event_type === 'phase_transition');
      $statPhase.textContent = phase ? (phase.data.to || '—') : '—';
      const failures = events.filter(e => e.data && e.data.parseStatus === 'failed').length;
      $statFailures.textContent = failures;
      $statHalts.textContent = events.filter(e => e.event_type === 'halt').length;
    }

    // ── Span tree builder ──
    function buildSpanTree(events) {
      // Map: span_id -> { start: event, end: event, children: [event...] }
      const spans = new Map();
      const loose = [];
      for (const e of events) {
        if (e.event_type === 'agent_start') {
          spans.set(e.span_id, { start: e, end: null, children: [] });
        } else if (e.event_type === 'agent_end' && spans.has(e.span_id)) {
          spans.get(e.span_id).end = e;
        } else {
          loose.push(e);
        }
      }
      // Attach children by parent_span_id
      const grouped = [];
      for (const e of loose) {
        const parent = e.parent_span_id && spans.get(e.parent_span_id);
        if (parent) {
          parent.children.push(e);
        } else {
          grouped.push({ type: 'loose', event: e });
        }
      }
      for (const [spanId, span] of spans) {
        grouped.push({ type: 'span', spanId, span });
      }
      // Sort by start timestamp of the leading event
      grouped.sort((a, b) => {
        const tsA = a.type === 'span' ? a.span.start.timestamp : a.event.timestamp;
        const tsB = b.type === 'span' ? b.span.start.timestamp : b.event.timestamp;
        return tsA.localeCompare(tsB);
      });
      return grouped;
    }

    // ── Render ──
    function renderTimeline() {
      const filtered = state.events.filter(eventPassesFilters);
      const html = [];
      if (filtered.length === 0) {
        html.push('<div class="empty">No events yet. The observatory will populate as the mission runs.</div>');
      } else if (state.filter.groupSpans) {
        const groups = buildSpanTree(filtered);
        for (const g of groups) {
          if (g.type === 'loose') {
            html.push(renderEventRow(g.event));
          } else {
            html.push(renderSpanCard(g.span));
          }
        }
      } else {
        for (const e of filtered) {
          html.push(renderEventRow(e));
        }
      }
      $timeline.innerHTML = html.join('');
    }

    function renderEventRow(e) {
      const summary = summarizeEvent(e);
      const status = e.data && e.data.parseStatus;
      const classes = ['event', `event-${e.event_type}`];
      if (e.agent_level) classes.push(`level-${e.agent_level}`);
      if (status === 'failed') classes.push('parseStatus-failed', 'failed');
      else if (status === 'ok') classes.push('parseStatus-ok');
      if (state.selectedEventId === e.span_id) classes.push('selected');
      const statusHtml = status ? `<span class="status status-${status}">${status}</span>` : '';
      return `<div class="${classes.join(' ')}" data-event-id="${e.span_id}">
        <span class="ts">${fmtTime(e.timestamp)}</span>
        <span class="type">${e.event_type}</span>
        <span class="level">${e.agent_level || ''}</span>
        <span class="summary">${escapeHtml(summary)}</span>
        ${statusHtml}
      </div>`;
    }

    function renderSpanCard(span) {
      const start = span.start;
      const end = span.end;
      const endTs = end ? new Date(end.timestamp).getTime() : Date.now();
      const startTs = new Date(start.timestamp).getTime();
      const durationMs = endTs - startTs;
      const status = end && end.data && end.data.parseStatus;
      const level = start.agent_level || 'agent';
      const title = `${level}${start.data && start.data.featureId ? ' ['+start.data.featureId+']' : ''}${start.data && start.data.milestoneId ? ' ['+start.data.milestoneId+']' : ''}`;
      const meta = `${durationMs}ms${status ? ' · '+status : ''}${span.children.length ? ' · '+span.children.length+' nested' : ''}`;
      const statusHtml = status ? `<span class="status status-${status}">${status}</span>` : '';
      const childHtml = span.children.length === 0
        ? '<div class="empty" style="padding: 8px 0; font-size: 11px;">No nested events.</div>'
        : span.children.map(c => {
            const childStatus = c.data && c.data.parseStatus;
            const childClasses = ['nested-event'];
            if (childStatus === 'failed' || c.event_type === 'halt') childClasses.push('failed');
            return `<div class="${childClasses.join(' ')}" data-event-id="${c.span_id}">
              <span class="ts">${fmtTime(c.timestamp)}</span>
              <span>${c.event_type}</span>
              <span class="summary">${escapeHtml(summarizeEvent(c))}</span>
            </div>`;
          }).join('');
      return `<div class="span-card">
        <div class="span-header" data-span-toggle="${start.span_id}">
          <span class="span-toggle">▼</span>
          <span class="span-title">${escapeHtml(title)}</span>
          <span class="span-meta">${escapeHtml(meta)}</span>
          ${statusHtml}
        </div>
        <div class="span-body" data-span-body="${start.span_id}">${childHtml}</div>
      </div>`;
    }

    // ── Tab switching ──
    function activateTab(tab) {
      state.activeTab = tab;
      if ($tabDiff) $tabDiff.classList.toggle('active', tab === 'diff');
      if ($tabJson) $tabJson.classList.toggle('active', tab === 'json');
      renderDetails();
    }

    // ── Details pane ──
    function renderDetails() {
      if (state.activeTab === 'diff') {
        $detailsContent.innerHTML = `<div id="diff-viewer">${renderDiff(state.diff.diff)}</div>`;
      } else {
        if (!state.selectedEventId) {
          $detailsContent.innerHTML = '<div id="details-placeholder">Select an event to view raw JSON</div>';
          return;
        }
        const e = state.events.find(ev => ev.span_id === state.selectedEventId);
        if (!e) {
          $detailsContent.innerHTML = '<div id="details-placeholder">Event not found</div>';
          return;
        }
        const title = `${e.event_type}${e.agent_level ? ' ('+e.agent_level+')' : ''} — ${e.timestamp}`;
        $detailsContent.innerHTML = `
          <div id="details-header">
            <h3>${escapeHtml(title)}</h3>
          </div>
          <pre id="details-body">${escapeHtml(JSON.stringify(e, null, 2))}</pre>
        `;
      }
    }

    function showDetails(e) {
      state.selectedEventId = e.span_id;
      state.activeTab = 'json';
      renderTimeline();
      activateTab('json');
    }

    function clearDetails() {
      state.selectedEventId = null;
      state.activeTab = 'diff';
      renderTimeline();
      activateTab('diff');
    }

    // Event delegation for clicks on timeline.
    $timeline.addEventListener('click', (ev) => {
      const row = ev.target.closest('[data-event-id]');
      if (row) {
        const id = row.dataset.eventId;
        const e = state.events.find(ev => ev.span_id === id);
        if (e) showDetails(e);
        return;
      }
      const toggle = ev.target.closest('[data-span-toggle]');
      if (toggle) {
        const id = toggle.dataset.spanToggle;
        const body = document.querySelector(`[data-span-body="${id}"]`);
        const caret = toggle.querySelector('.span-toggle');
        if (body) {
          body.classList.toggle('collapsed');
          if (caret) caret.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
        }
      }
    });

    // Tab click delegation
    $details.addEventListener('click', (ev) => {
      const tab = ev.target.closest('[data-tab]');
      if (tab) {
        activateTab(tab.dataset.tab);
      }
    });

    // ── Filter wiring ──
    $search.addEventListener('input', () => { state.filter.search = $search.value; renderTimeline(); });
    $filterType.addEventListener('change', () => { state.filter.type = $filterType.value; renderTimeline(); });
    $filterLevel.addEventListener('change', () => { state.filter.level = $filterLevel.value; renderTimeline(); });
    $filterStatus.addEventListener('change', () => { state.filter.status = $filterStatus.value; renderTimeline(); });
    $toggleFailedOnly.addEventListener('click', () => {
      state.filter.failedOnly = !state.filter.failedOnly;
      $toggleFailedOnly.classList.toggle('active', state.filter.failedOnly);
      renderTimeline();
    });
    $toggleSpans.addEventListener('click', () => {
      state.filter.groupSpans = !state.filter.groupSpans;
      $toggleSpans.classList.toggle('active', state.filter.groupSpans);
      renderTimeline();
    });
    $toggleSpans.classList.add('active'); // default on

    // ── Polling ──
    async function pollEvents() {
      try {
        const res = await fetch('/api/events');
        if (!res.ok) return;
        const events = await res.json();
        if (events.length === state.lastEventCount) return;
        state.events = events;
        state.lastEventCount = events.length;
        updateStats();
        renderTimeline();
        if (state.activeTab === 'json' && state.selectedEventId) {
          renderDetails();
        }
      } catch (err) {
        console.error('Polling failed:', err);
      }
    }

    async function pollDiff() {
      try {
        const res = await fetch('/api/diff');
        if (!res.ok) return;
        const data = await res.json();
        state.diff = data;
        if (state.activeTab === 'diff') {
          renderDetails();
        }
      } catch (err) {
        console.error('Diff polling failed:', err);
      }
    }

    pollEvents();
    setInterval(pollEvents, 500);
    pollDiff();
    setInterval(pollDiff, 1000);
  </script>
</body>
</html>
